<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Room Booking - Team Hub</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#10b981', // Emerald 500
                    }
                }
            }
        }
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- SupaBase connection -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <!-- Main Container -->
    <div class="max-w-md w-full my-8">

        <!-- Navigation Tabs -->
        <div class="flex bg-slate-200/50 p-1 rounded-2xl mb-6 backdrop-blur-sm">
            <button id="tab-bookings" class="flex-1 py-3 px-4 rounded-xl text-sm font-bold transition-all bg-white text-slate-800 shadow-sm">
                Room Bookings
            </button>
            <button id="tab-office" class="flex-1 py-3 px-4 rounded-xl text-sm font-bold transition-all text-slate-500 hover:text-slate-700">
                Office Requests
            </button>
        </div>

        <!-- Room Reservations Section -->
        <div id="section-bookings">
            <!-- Header -->
            <div class="text-center mb-8">
                <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight flex items-center justify-center">
                    <i data-lucide="door-open" class="w-8 h-8 mr-2 text-primary"></i>
                    Room Reservations
                </h1>
                <p class="text-slate-500 mt-2">Pick a room, reserve a slot, and notify the team</p>
            </div>

        <!-- Main Card -->
        <div class="bg-white rounded-3xl shadow-2xl p-8 mb-8 border border-white">
            <form id="booking-form" class="space-y-5">
                <!-- Hidden ID for Editing -->
                <input type="hidden" id="booking-id" name="id">


                <!-- Room Selection -->
                <div>
                    <label for="room-select" class="block text-sm font-bold text-slate-700 mb-1.5 ml-1">Select
                        Room</label>
                    <div class="relative">
                        <span
                            class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400 pointer-events-none">
                            <i data-lucide="map-pin" class="w-5 h-5"></i>
                        </span>
                        <select id="room-select" name="room" required
                            class="block w-full pl-11 pr-3 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm transition-all appearance-none cursor-pointer">
                            <option value="" disabled selected>Choose a room...</option>
                            <option value="Micron">Micron</option>
                            <option value="Phimton">Phimton</option>
                            <option value="Meeting Room">Meeting Room</option>
                            <option value="Eclibs">Eclibs</option>

                        </select>
                        <div
                            class="absolute inset-y-0 right-0 pr-3.5 flex items-center pointer-events-none text-slate-400">
                            <i data-lucide="chevron-down" class="w-5 h-5"></i>
                        </div>
                    </div>
                </div>

                <!-- Your Name -->
                <div>
                    <label for="user-name" class="block text-sm font-bold text-slate-700 mb-1.5 ml-1">Your Name</label>
                    <div class="relative">
                        <span
                            class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400 pointer-events-none">
                            <i data-lucide="user" class="w-5 h-5"></i>
                        </span>
                        <input type="text" id="user-name" name="name" required placeholder="Who is booking?"
                            class="block w-full pl-11 pr-3 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm transition-all">
                    </div>
                </div>

                <!-- Date -->
                <div>
                    <label for="booking-date"
                        class="block text-sm font-bold text-slate-700 mb-1.5 ml-1">Booking Date</label>
                    <input type="date" id="booking-date" name="date" required
                        class="block w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm transition-all">
                </div>

                <!-- Time Range -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="start-time"
                            class="block text-sm font-bold text-slate-700 mb-1.5 ml-1">Start Time</label>
                        <input type="time" id="start-time" name="start_time" required
                            class="block w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm transition-all">
                    </div>
                    <div>
                        <label for="end-time"
                            class="block text-sm font-bold text-slate-700 mb-1.5 ml-1">End Time</label>
                        <input type="time" id="end-time" name="end_time" required
                            class="block w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm transition-all">
                    </div>
                </div>

                <!-- Warning (Duplicate) -->
                <div id="duplicate-warning"
                    class="hidden animate-pulse flex items-center p-3.5 text-sm text-rose-800 border-2 border-rose-100 rounded-2xl bg-rose-50"
                    role="alert">
                    <i data-lucide="alert-triangle" class="w-5 h-5 mr-3 flex-shrink-0"></i>
                    <div id="warning-message">This room is already reserved for this time range.</div>
                </div>

                <!-- Buttons -->
                <div class="flex flex-col gap-3">
                    <button type="submit" id="submit-btn"
                        class="group relative w-full flex justify-center py-4 px-4 text-sm font-extrabold rounded-2xl text-white bg-primary hover:bg-emerald-600 focus:outline-none focus:ring-4 focus:ring-emerald-100 transition-all shadow-xl shadow-emerald-100 active:scale-[0.98]">
                        <span
                            class="absolute left-0 inset-y-0 flex items-center pl-4 group-hover:translate-x-1 transition-transform">
                            <i data-lucide="send" class="w-5 h-5"></i>
                        </span>
                        <span id="submit-text">Send Booking</span>
                    </button>
                    <button type="button" id="cancel-edit"
                        class="hidden w-full py-3 px-4 text-xs font-bold rounded-xl text-slate-500 bg-slate-100 hover:bg-slate-200 transition-all uppercase tracking-widest">
                        Cancel Edit
                    </button>
                </div>
            </form>
        </div>

        <!-- History Card -->
        <div class="bg-white rounded-3xl shadow-xl p-6 border border-slate-100 premium-shadow">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-extrabold text-slate-800 flex items-center">
                    <i data-lucide="calendar-check-2" class="w-5 h-5 mr-2 text-primary"></i>
                    Recent Bookings
                </h2>
                <button id="clear-all"
                    class="text-xs font-bold text-rose-500 hover:text-rose-700 transition-colors uppercase tracking-widest flex items-center">
                    <i data-lucide="trash-2" class="w-3 h-3 mr-1"></i>
                    Clear All
                </button>
            </div>

            <!-- Filter -->
            <div class="mb-4">
                <div class="bg-slate-50 p-1 rounded-xl flex flex-wrap gap-1">

                    <button class="filter-btn flex-1 min-w-[45%] px-4 py-2 rounded-lg text-xs font-bold active-filter"
                        data-room="All">All Rooms</button>

                    <button class="filter-btn flex-1 min-w-[45%] px-4 py-2 rounded-lg text-xs font-bold text-slate-500"
                        data-room="Micron">Micron</button>

                    <button class="filter-btn flex-1 min-w-[45%] px-4 py-2 rounded-lg text-xs font-bold text-slate-500"
                        data-room="Phimton">Phimton</button>

                    <button class="filter-btn flex-1 min-w-[45%] px-4 py-2 rounded-lg text-xs font-bold text-slate-500"
                        data-room="Meeting Room">Meeting Room</button>

                    <button class="filter-btn flex-1 min-w-[45%] px-4 py-2 rounded-lg text-xs font-bold text-slate-500"
                        data-room="Eclibs">Eclibs</button>

                </div>
            </div>

            <!-- List -->
            <div id="bookings-list" class="space-y-4 max-h-[300px] overflow-y-auto pr-2 scroll-smooth custom-scrollbar">
                <!-- Bookings injected here -->
            </div>
        </div>

        </div>

        <!-- Office Requests Section (Hidden by default) -->
        <div id="section-office" class="hidden animate-in fade-in duration-300">
            <!-- Header -->
            <div class="text-center mb-8">
                <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight flex items-center justify-center">
                    <i data-lucide="building-2" class="w-8 h-8 mr-2 text-primary"></i>
                    Office Requests
                </h1>
                <p class="text-slate-500 mt-2">External clients can request a room or office</p>
            </div>

            <!-- Request Form Card -->
            <div class="bg-white rounded-3xl shadow-2xl p-8 mb-8 border border-white">
                <form id="office-request-form" class="space-y-5">
                    <!-- Room Name -->
                    <div>
                        <label for="off-room-name" class="block text-sm font-bold text-slate-700 mb-1.5 ml-1">Room Name</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400 pointer-events-none">
                                <i data-lucide="map-pin" class="w-5 h-5"></i>
                            </span>
                            <input type="text" id="off-room-name" name="room_name" required placeholder="Which room is requested?"
                                class="block w-full pl-11 pr-3 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm transition-all">
                        </div>
                    </div>

                    <!-- Client Name -->
                    <div>
                        <label for="off-client-name" class="block text-sm font-bold text-slate-700 mb-1.5 ml-1">Client Name</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400 pointer-events-none">
                                <i data-lucide="user" class="w-5 h-5"></i>
                            </span>
                            <input type="text" id="off-client-name" name="client_name" required placeholder="Full name of client"
                                class="block w-full pl-11 pr-3 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm transition-all">
                        </div>
                    </div>

                    <!-- Phone Number -->
                    <div>
                        <label for="off-phone" class="block text-sm font-bold text-slate-700 mb-1.5 ml-1">Phone Number</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400 pointer-events-none">
                                <i data-lucide="phone" class="w-5 h-5"></i>
                            </span>
                            <input type="tel" id="off-phone" name="phone" required placeholder="e.g. +123 456 789"
                                class="block w-full pl-11 pr-3 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm transition-all">
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit"
                        class="group relative w-full flex justify-center py-4 px-4 text-sm font-extrabold rounded-2xl text-white bg-primary hover:bg-emerald-600 focus:outline-none focus:ring-4 focus:ring-emerald-100 transition-all shadow-xl shadow-emerald-100 active:scale-[0.98]">
                        <span class="absolute left-0 inset-y-0 flex items-center pl-4 group-hover:translate-x-1 transition-transform">
                            <i data-lucide="plus-circle" class="w-5 h-5"></i>
                        </span>
                        <span>Submit Request</span>
                    </button>
                    
                    <div id="office-success" class="hidden flex items-center p-3.5 text-sm text-emerald-800 border-2 border-emerald-100 rounded-2xl bg-emerald-50">
                        <i data-lucide="check-circle" class="w-5 h-5 mr-3 flex-shrink-0"></i>
                        <div>Request submitted successfully!</div>
                    </div>
                </form>
            </div>

            <!-- Office Requests List Card -->
            <div class="bg-white rounded-3xl shadow-xl p-6 border border-slate-100">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-xl font-extrabold text-slate-800 flex items-center">
                        <i data-lucide="list" class="w-5 h-5 mr-2 text-slate-400"></i>
                        External Requests
                    </h2>
                </div>

                <div id="office-list" class="space-y-4 max-h-[300px] overflow-y-auto pr-2 scroll-smooth custom-scrollbar">
                    <!-- Requests injected here -->
                </div>
            </div>
        </div>

        <footer class="mt-12 text-center text-slate-400 text-[10px] font-bold uppercase tracking-[2px]">
            &copy; 2026 Internal Booking Tool
        </footer>
    </div>

    <style>
        .active-filter {
            background-color: white;
            color: #1e293b;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #e2e8f0;
            border-radius: 10px;
        }

        .fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Professional shadow for cards */
        .premium-shadow {
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.05), 0 4px 12px -5px rgba(0, 0, 0, 0.02);
        }

        /* Smooth scale for buttons */
        .btn-interact {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-interact:hover {
            transform: translateY(-1px);
        }
        .btn-interact:active {
            transform: translateY(0) scale(0.96);
        }
    </style>

    <script src="main.js"></script>
</body>

</html>
